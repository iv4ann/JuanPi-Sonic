<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Reemplaza 'tu-imagen.jpg' por la ruta donde guardes la imagen */
            background-image: linear-gradient(rgba(248, 90, 90, 0.7), rgba(70, 114, 173, 0.7)),
                url('fondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container-dashboard {
            background: rgba(255, 255, 255, 0.8);
            /* Un fondo blanco semitransparente para el contenido */
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="container-dashboard">
        <h1 class="mb-4">Dashboard</h1>
        <div class="d-grid gap-2 d-md-block">
            <a href="/servicios.html" class="btn btn-primary btn-lg">Servicios</a>
            <a href="/logout" class="btn btn-danger btn-lg">Salir</a>
        </div>
    </div>

</body>

</html>
