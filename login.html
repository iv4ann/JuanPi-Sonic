<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / OrricoSolutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow-lg" style="width: 320px;">
        <h3 class="text-center">Login</h3>

        <div id="errorMsg" class="alert alert-danger d-none text-center"></div>

        <form action="/login" method="POST">
            <input class="form-control mb-2" name="email" type="email" placeholder="Email" required>
            <input class="form-control mb-2" name="password" type="password" placeholder="Password" required>
            <button class="btn btn-primary w-100">Entrar</button>
        </form>
        <hr>
        <a href="registro.html" class="text-center">Registrarse</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');

        const errorMsg = document.getElementById('errorMsg');

        if (error) {
            errorMsg.classList.remove('d-none');

            if (error === 'empty') {
                errorMsg.innerText = 'Todos los campos son obligatorios';
            } else if (error === 'server') {
                errorMsg.innerText = 'Error del servidor';
            } else {
                errorMsg.innerText = 'Usuario o contraseña no válidos';
            }

            document.querySelectorAll('input').forEach(input => {
                input.classList.add('is-invalid');
            });
        }
    </script>

</body>

</html>
