<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>CRUD Servicios</h2>

<form id="form">
<input class="form-control mb-2" name="tipo_servicio" placeholder="Servicio">
<input class="form-control mb-2" name="ubicacion" placeholder="Ubicación">
<input class="form-control mb-2" name="precio" placeholder="Precio">
<button class="btn btn-success">Guardar</button>
</form>

<table class="table mt-4">
<thead>
<tr>
<th>Servicio</th>
<th>Ubicación</th>
<th>Precio</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>
const tabla = document.getElementById('tabla');
const form = document.getElementById('form');

let editando = false;
let idEditar = null;


function cargar() {
  fetch('/servicios')
  .then(r=>r.json())
  .then(data=>{
    tabla.innerHTML='';

    data.forEach(s=>{
      tabla.innerHTML += `
      <tr>
        <td>${s.tipo_servicio}</td>
        <td>${s.ubicacion}</td>
        <td>${s.precio}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="editar(${s.id}, '${s.tipo_servicio}', '${s.ubicacion}', ${s.precio})">Editar</button>
          <button class="btn btn-danger btn-sm" onclick="eliminar(${s.id})">Eliminar</button>
        </td>
      </tr>`;
    });
  });
}


form.addEventListener('submit', e=>{
  e.preventDefault();

  const data = new FormData(form);

  if(editando){
    fetch('/servicios/update/' + idEditar, {
      method:'POST',
      body:new URLSearchParams(data)
    }).then(()=>{
      editando=false;
      idEditar=null;
      form.reset();
      cargar();
    });

  } else {
    fetch('/servicios',{
      method:'POST',
      body:new URLSearchParams(data)
    }).then(()=>{
      form.reset();
      cargar();
    });
  }
});


function editar(id, servicio, ubicacion, precio){
  form.tipo_servicio.value = servicio;
  form.ubicacion.value = ubicacion;
  form.precio.value = precio;

  editando = true;
  idEditar = id;
}


function eliminar(id){
  fetch('/servicios/delete/' + id)
    .then(()=>cargar());
}


cargar();
</script>

</body>
</html>
