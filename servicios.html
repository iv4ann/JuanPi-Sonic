<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Servicios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      /* Reemplaza 'tu-imagen.jpg' por la ruta donde guardes la imagen */
      background-image: linear-gradient(rgba(248, 90, 90, 0.7), rgba(70, 114, 173, 0.7)),
        url('fondo.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>

<body class="container mt-4">

  <h2>CRUD Servicios</h2>

  <form id="form">
    <input class="form-control mb-2" name="tipo_servicio" placeholder="Servicio" required>
    <input class="form-control mb-2" name="ubicacion" placeholder="Ubicación" required>
    <input class="form-control mb-2" name="precio" type="number" placeholder="Precio" required>
    <center><button class="btn btn-success">Guardar</button></center>
  </form>

  <table class="table mt-4">
    <thead>
      <tr>
        <th>Servicio</th>
        <th>Ubicación</th>
        <th>Precio</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <script>
    const tabla = document.getElementById('tabla');
    const form = document.getElementById('form');

    let editando = false;
    let idEditar = null;

    // cargar datos
    function cargar() {
      fetch('/servicios')
        .then(res => res.json()) // Cambiado a .json()
        .then(data => {
          tabla.innerHTML = '';
          data.forEach(s => {
            const row = document.createElement('tr');
            // Usamos variables intermedias para mayor claridad
            row.innerHTML = `
            <td>${s.tipo_servicio}</td>
            <td>${s.ubicacion}</td>
            <td>$${s.precio}</td>
            <td>
              <button class="btn btn-warning btn-sm btn-edit">Editar</button>
              <button class="btn btn-danger btn-sm btn-delete">Eliminar</button>
            </td>
          `;

            row.querySelector('.btn-edit').onclick = () => editar(s.id, s.tipo_servicio, s.ubicacion, s.precio);
            row.querySelector('.btn-delete').onclick = () => {
              if (confirm('¿Seguro que quieres borrarlo?')) eliminar(s.id);
            };

            tabla.appendChild(row);
          });
        })
        .catch(err => {
          console.error("Error al cargar:", err);
          tabla.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error al conectar con el servidor</td></tr>';
        });
    }


    // guardar
    form.addEventListener('submit', e => {
      e.preventDefault();

      const data = new FormData(form);

      if (editando) {
        fetch('/servicios/' + idEditar, {
          method: 'PUT',
          body: new URLSearchParams(data)
        })
          .then(() => {
            editando = false;
            idEditar = null;
            form.reset();
            cargar();
          });

      } else {
        fetch('/servicios', {
          method: 'POST',
          body: new URLSearchParams(data)
        })
          .then(() => {
            form.reset();
            cargar();
          });
      }
    });

    // editar
    function editar(id, servicio, ubicacion, precio) {
      form.tipo_servicio.value = servicio;
      form.ubicacion.value = ubicacion;
      form.precio.value = precio;

      editando = true;
      idEditar = id;
    }

    // eliminar
    function eliminar(id) {
      fetch('/servicios/' + id, {
        method: 'DELETE'
      })
        .then(() => cargar());
    }

    // 🔄 iniciar
    cargar();
  </script>
  <a href="/dashboard" class="text-center" style="color: white; font-size: large;">Regresar</a>

</body>

</html>
